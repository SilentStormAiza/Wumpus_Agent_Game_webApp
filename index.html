<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wumpus World Logic Agent</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0e1a;
            font-family: 'Courier New', 'Monaco', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 {
            color: #00ff88;
            text-align: center;
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            color: #8892a0;
            font-size: 0.7rem;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .controls input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            width: 70px;
            text-align: center;
        }
        button {
            background: #00ff88;
            color: #0a0e1a;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover {
            background: #00cc66;
            transform: scale(1.02);
        }
        .grid {
            display: grid;
            gap: 4px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            margin: 15px 0;
        }
        .cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.15s;
            position: relative;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
        }
        .cell:hover {
            transform: scale(0.96);
            filter: brightness(1.2);
        }
        .cell.safe {
            background: rgba(10, 58, 26, 0.9);
            border: 2px solid #00ff88;
            box-shadow: 0 0 8px rgba(0,255,136,0.3);
        }
        .cell.visited {
            background: rgba(26, 42, 74, 0.9);
            border: 1px solid rgba(74, 106, 154, 0.8);
        }
        .cell.unknown {
            background: rgba(13, 18, 28, 0.9);
            border: 1px solid rgba(42, 58, 90, 0.8);
        }
        .cell.agent {
            background: rgba(255, 217, 102, 0.9);
            border: 3px solid #00ff88;
            box-shadow: 0 0 15px rgba(0,255,136,0.5);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0,255,136,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); }
        }
        .coord {
            position: absolute;
            bottom: 3px;
            right: 4px;
            font-size: 8px;
            opacity: 0.6;
            color: rgba(255,255,255,0.5);
        }
        .info-panel {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .metrics {
            flex: 1;
            background: rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        .metric {
            display: inline-block;
            margin: 0 15px 8px 0;
            padding: 5px;
            color: #c8d0da;
        }
        .metric span {
            color: #00ff88;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .log {
            flex: 2;
            background: rgba(255,255,255,0.08);
            padding: 10px;
            border-radius: 10px;
            height: 160px;
            overflow-y: auto;
            font-size: 11px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        .log div {
            padding: 4px;
            border-left: 3px solid #00ff88;
            margin: 2px 0;
            font-family: monospace;
        }
        .badge {
            display: inline-block;
            padding: 3px 12px;
            margin: 3px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge.on {
            background: #00ff88;
            color: #0a0e1a;
        }
        .badge.off {
            background: rgba(42, 58, 90, 0.8);
            color: #8892a0;
        }
        .legend {
            display: flex;
            gap: 15px;
            font-size: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
            color: #c8d0da;
        }
        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .color-box {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }
        .status {
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: bold;
        }
        .status.win {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        .status.lose {
            background: rgba(255,68,85,0.2);
            color: #ff4455;
            border: 1px solid #ff4455;
        }
        .status.playing {
            background: rgba(77,166,255,0.2);
            color: #4da6ff;
            border: 1px solid #4da6ff;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>WUMPUS LOGIC AGENT</h1>
    <div class="subtitle">Propositional Logic + Resolution Refutation</div>
    
    <div class="controls">
        <input type="number" id="rows" value="4" min="2" max="6">
        <input type="number" id="cols" value="4" min="2" max="6">
        <button onclick="newGame()">NEW GAME</button>
    </div>
    
    <div class="legend">
        <span><div class="color-box" style="background:rgba(10,58,26,0.9);border:1px solid #0f0"></div>Safe</span>
        <span><div class="color-box" style="background:rgba(26,42,74,0.9)"></div>Visited</span>
        <span><div class="color-box" style="background:rgba(13,18,28,0.9);border:1px solid #2a3a5a"></div>Unknown</span>
        <span><div class="color-box" style="background:rgba(255,217,102,0.9);border:3px solid #0f0"></div>Agent</span>
        <span>A = Agent</span>
        <span>G = Gold</span>
        <span>W = Wumpus</span>
        <span>P = Pit</span>
        <span>B = Breeze</span>
        <span>S = Stench</span>
    </div>
    
    <div id="grid" class="grid"></div>
    
    <div class="info-panel">
        <div class="metrics">
            <div class="metric">Position: <span id="pos">0,0</span></div>
            <div class="metric">Moves: <span id="moves">0</span></div>
            <div class="metric">Inferences: <span id="inf">0</span></div>
            <div class="metric">Visited: <span id="visitedCount">1</span></div>
            <div>
                <span id="breezeBadge" class="badge off">BREEZE</span>
                <span id="stenchBadge" class="badge off">STENCH</span>
            </div>
        </div>
        <div class="log" id="log"></div>
    </div>
    <div id="status" class="status playing">PLAYING - Click adjacent cells to move</div>
</div>

<script>
// ========== RESOLUTION ENGINE ==========
class KB {
    constructor() {
        this.clauses = [];
    }
    
    add(sentence) {
        let clauses = this.parse(sentence);
        for (let c of clauses) {
            if (!this.has(c)) this.clauses.push(c);
        }
    }
    
    parse(s) {
        s = s.trim();
        if (s.includes('==>')) {
            let [p, q] = s.split('==>');
            return [new Set([`~${p.trim()}`, q.trim()])];
        }
        if (s.includes('&')) {
            let parts = s.split('&');
            let result = [];
            for (let p of parts) result.push(...this.parse(p.trim()));
            return result;
        }
        if (s.includes('|')) {
            let lits = s.split('|').map(x => x.trim());
            return [new Set(lits)];
        }
        return [new Set([s])];
    }
    
    has(c) {
        let key = [...c].sort().join('|');
        return this.clauses.some(x => [...x].sort().join('|') === key);
    }
    
    ask(q) {
        let neg = q.startsWith('~') ? q.slice(1) : `~${q}`;
        let clauses = [...this.clauses.map(c => new Set(c))];
        clauses.push(...this.parse(neg));
        let steps = 0;
        
        while (true) {
            let newC = [];
            for (let i = 0; i < clauses.length; i++) {
                for (let j = i + 1; j < clauses.length; j++) {
                    let resolvents = this.resolve(clauses[i], clauses[j]);
                    for (let r of resolvents) {
                        steps++;
                        if (r.size === 0) return { result: true, steps };
                        if (!this.exists(clauses, r) && !this.exists(newC, r)) newC.push(r);
                    }
                }
            }
            if (newC.length === 0) return { result: false, steps };
            clauses.push(...newC);
            if (steps > 500) return { result: false, steps };
        }
    }
    
    resolve(c1, c2) {
        let res = [];
        for (let lit of c1) {
            let neg = lit.startsWith('~') ? lit.slice(1) : `~${lit}`;
            if (c2.has(neg)) {
                let r = new Set([...c1, ...c2]);
                r.delete(lit);
                r.delete(neg);
                res.push(r);
            }
        }
        return res;
    }
    
    exists(list, c) {
        let key = [...c].sort().join('|');
        return list.some(x => [...x].sort().join('|') === key);
    }
}

// ========== GAME STATE ==========
let Game = {
    rows: 4, cols: 4, world: {}, agent: [0, 0], visited: {}, kb: null,
    gameOver: false, won: false, moves: 0, inferences: 0, logMessages: []
};

function addLog(msg, isGood = true) {
    Game.logMessages.unshift(msg);
    if (Game.logMessages.length > 20) Game.logMessages.pop();
    let logDiv = document.getElementById('log');
    logDiv.innerHTML = Game.logMessages.map(m => {
        let cls = '';
        if (m.includes('SAFE') || m.includes('safe')) cls = 'color: #00ff88;';
        else if (m.includes('GOLD')) cls = 'color: #ffd700;';
        else if (m.includes('GAME OVER')) cls = 'color: #ff4455;';
        else cls = 'color: #8892a0;';
        return `<div style="${cls} border-left-color: #00ff88;">${m}</div>`;
    }).join('');
}

function getNeighbors(r, c, rows, cols) {
    let neighbors = [];
    for (let [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        let nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) neighbors.push([nr, nc]);
    }
    return neighbors;
}

function updateKB(r, c, breeze, stench) {
    let neighbors = getNeighbors(r, c, Game.rows, Game.cols);
    
    if (!breeze) {
        for (let [nr, nc] of neighbors) Game.kb.add(`~P_${nr}_${nc}`);
    } else if (neighbors.length) {
        Game.kb.add(neighbors.map(([nr, nc]) => `P_${nr}_${nc}`).join('|'));
    }
    
    if (!stench) {
        for (let [nr, nc] of neighbors) Game.kb.add(`~W_${nr}_${nc}`);
    } else if (neighbors.length) {
        Game.kb.add(neighbors.map(([nr, nc]) => `W_${nr}_${nc}`).join('|'));
    }
}

function isSafe(r, c) {
    let pitRes = Game.kb.ask(`~P_${r}_${c}`);
    let wumpRes = Game.kb.ask(`~W_${r}_${c}`);
    Game.inferences += pitRes.steps + wumpRes.steps;
    document.getElementById('inf').innerHTML = Game.inferences;
    return pitRes.result && wumpRes.result;
}

function getCellState(r, c) {
    if (Game.gameOver) return 'unknown';
    if (Game.agent[0] === r && Game.agent[1] === c) return 'agent';
    if (Game.visited[`${r},${c}`]) return 'visited';
    if (isSafe(r, c)) return 'safe';
    return 'unknown';
}

function moveTo(r, c) {
    if (Game.gameOver) {
        addLog("Game over! Click NEW GAME", false);
        return;
    }
    
    let [ar, ac] = Game.agent;
    if (Math.abs(ar - r) + Math.abs(ac - c) !== 1) {
        addLog(`Cannot move to (${r},${c}) - not adjacent to (${ar},${ac})!`, false);
        return;
    }
    
    let safe = isSafe(r, c);
    addLog(`Resolution checking (${r},${c}): ${safe ? 'SAFE' : 'UNSAFE'}`);
    
    Game.agent = [r, c];
    Game.moves++;
    Game.visited[`${r},${c}`] = true;
    document.getElementById('moves').innerHTML = Game.moves;
    document.getElementById('visitedCount').innerHTML = Object.keys(Game.visited).length;
    document.getElementById('pos').innerHTML = `${r},${c}`;
    
    let cell = Game.world[`${r},${c}`];
    
    if (cell.pit) {
        addLog(`FELL INTO PIT at (${r},${c}) - GAME OVER!`, false);
        Game.gameOver = true;
        document.getElementById('status').className = 'status lose';
        document.getElementById('status').innerHTML = 'GAME OVER - Click NEW GAME';
    } else if (cell.wumpus) {
        addLog(`EATEN BY WUMPUS at (${r},${c}) - GAME OVER!`, false);
        Game.gameOver = true;
        document.getElementById('status').className = 'status lose';
        document.getElementById('status').innerHTML = 'GAME OVER - Click NEW GAME';
    } else if (cell.gold) {
        addLog(`GOLD FOUND at (${r},${c}) - YOU WIN!`);
        Game.won = true;
        Game.gameOver = true;
        document.getElementById('status').className = 'status win';
        document.getElementById('status').innerHTML = 'YOU WON! GOLD COLLECTED!';
    } else {
        updateKB(r, c, cell.breeze, cell.stench);
        if (cell.breeze) addLog("Breeze - pit nearby!");
        if (cell.stench) addLog("Stench - Wumpus nearby!");
    }
    
    renderGrid();
    
    let cur = Game.world[`${Game.agent[0]},${Game.agent[1]}`];
    document.getElementById('breezeBadge').className = `badge ${cur.breeze ? 'on' : 'off'}`;
    document.getElementById('stenchBadge').className = `badge ${cur.stench ? 'on' : 'off'}`;
}

function renderGrid() {
    let gridDiv = document.getElementById('grid');
    let size = Math.min(70, Math.floor(500 / Math.max(Game.rows, Game.cols)));
    gridDiv.style.gridTemplateColumns = `repeat(${Game.cols}, ${size}px)`;
    
    let html = '';
    for (let i = 0; i < Game.rows; i++) {
        for (let j = 0; j < Game.cols; j++) {
            let state = getCellState(i, j);
            let isAgent = (Game.agent[0] === i && Game.agent[1] === j);
            let cell = Game.world[`${i},${j}`];
            
            let text = '';
            if (isAgent) text = 'A';
            else if (Game.gameOver && cell.gold) text = 'G';
            else if (Game.gameOver && cell.wumpus) text = 'W';
            else if (Game.gameOver && cell.pit) text = 'P';
            else if (Game.visited[`${i},${j}`]) {
                if (cell.breeze) text = 'B';
                else if (cell.stench) text = 'S';
                else text = '';
            }
            
            if (!text && state === 'safe') text = 'S';
            if (!text && state === 'visited') text = 'V';
            if (!text && state === 'unknown') text = '?';
            
            html += `<div class="cell ${state}" onclick="moveTo(${i},${j})">
                        <div style="font-size:18px; font-weight:bold;">${text}</div>
                        <div class="coord">${i},${j}</div>
                    </div>`;
        }
    }
    gridDiv.innerHTML = html;
}

function newGame() {
    let rows = Math.min(6, Math.max(2, parseInt(document.getElementById('rows').value) || 4));
    let cols = Math.min(6, Math.max(2, parseInt(document.getElementById('cols').value) || 4));
    
    Game.rows = rows;
    Game.cols = cols;
    Game.world = {};
    
    // Initialize world
    for (let i = 0; i < rows; i++) {
        for (let j = 0; j < cols; j++) {
            Game.world[`${i},${j}`] = { pit: false, wumpus: false, gold: false, breeze: false, stench: false };
        }
    }
    
    // Place Wumpus
    while (true) {
        let wr = Math.floor(Math.random() * rows);
        let wc = Math.floor(Math.random() * cols);
        if (wr !== 0 || wc !== 0) {
            Game.world[`${wr},${wc}`].wumpus = true;
            break;
        }
    }
    
    // Place Pits
    for (let i = 0; i < rows; i++) {
        for (let j = 0; j < cols; j++) {
            if ((i !== 0 || j !== 0) && !Game.world[`${i},${j}`].wumpus && Math.random() < 0.15) {
                Game.world[`${i},${j}`].pit = true;
            }
        }
    }
    
    // Place Gold
    while (true) {
        let gr = Math.floor(Math.random() * rows);
        let gc = Math.floor(Math.random() * cols);
        if ((gr !== 0 || gc !== 0) && !Game.world[`${gr},${gc}`].pit && !Game.world[`${gr},${gc}`].wumpus) {
            Game.world[`${gr},${gc}`].gold = true;
            break;
        }
    }
    
    // Set breezes and stenches
    for (let i = 0; i < rows; i++) {
        for (let j = 0; j < cols; j++) {
            let neighbors = getNeighbors(i, j, rows, cols);
            for (let [nr, nc] of neighbors) {
                if (Game.world[`${nr},${nc}`].pit) Game.world[`${i},${j}`].breeze = true;
                if (Game.world[`${nr},${nc}`].wumpus) Game.world[`${i},${j}`].stench = true;
            }
        }
    }
    
    // Reset game state
    Game.agent = [0, 0];
    Game.visited = { "0,0": true };
    Game.kb = new KB();
    Game.kb.add("~P_0_0");
    Game.kb.add("~W_0_0");
    Game.gameOver = false;
    Game.won = false;
    Game.moves = 0;
    Game.inferences = 0;
    Game.logMessages = [];
    
    let start = Game.world["0,0"];
    updateKB(0, 0, start.breeze, start.stench);
    
    addLog("Game started at (0,0)");
    if (start.breeze) addLog("Breeze - pit nearby!");
    if (start.stench) addLog("Stench - Wumpus nearby!");
    
    document.getElementById('moves').innerHTML = '0';
    document.getElementById('inf').innerHTML = '0';
    document.getElementById('visitedCount').innerHTML = '1';
    document.getElementById('pos').innerHTML = '0,0';
    document.getElementById('status').className = 'status playing';
    document.getElementById('status').innerHTML = 'PLAYING - Click adjacent cells to move';
    
    renderGrid();
    
    let cur = Game.world["0,0"];
    document.getElementById('breezeBadge').className = `badge ${cur.breeze ? 'on' : 'off'}`;
    document.getElementById('stenchBadge').className = `badge ${cur.stench ? 'on' : 'off'}`;
}

// Start game
newGame();
</script>
</body>
</html>
